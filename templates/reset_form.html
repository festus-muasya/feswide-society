<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>RECOVERY | FESWIDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #0a192f;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="h-screen flex items-center justify-center p-6">
    <div class="glass w-full max-w-md p-12 rounded-[3rem] shadow-2xl text-white text-center">
        <h2 class="text-2xl font-black uppercase tracking-tighter italic mb-8">Set New Passkey</h2>
        <form method="POST" class="space-y-6">
            <input type="password" name="password" placeholder="NEW SECURE PASSKEY" required
                class="w-full bg-white/5 border border-white/10 p-5 rounded-3xl outline-none focus:border-orange-500 transition-all text-center font-bold">
            <button type="submit"
                class="w-full bg-orange-600 p-5 rounded-3xl font-black uppercase tracking-widest shadow-lg">Update
                Identity</button>
        </form>
    </div>
</body>

</html>
