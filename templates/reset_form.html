<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>RECOVERY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072') no-repeat center center fixed;
            background-size: cover;
        }

        .glass {
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="h-screen flex items-center justify-center p-6 select-none" oncontextmenu="return false;">
    <div class="glass w-full max-w-md p-12 rounded-[3rem] shadow-2xl text-white text-center">
        <h2 class="text-3xl font-black uppercase tracking-tighter italic mb-4">Set New Passkey</h2>
        <p class="text-xs text-gray-400 mb-10 leading-relaxed uppercase tracking-widest">Authorized Recovery Terminal
        </p>

        <form method="POST" class="space-y-6">
            <input type="password" name="password" placeholder="NEW SECURE PASSKEY" required
                class="w-full bg-white/5 border border-white/10 p-5 rounded-3xl outline-none focus:border-orange-500 transition-all text-center font-bold">
            <button type="submit"
                class="w-full bg-orange-600 hover:bg-orange-700 p-5 rounded-3xl font-black uppercase tracking-[0.2em] shadow-lg shadow-orange-900/30">
                Update Identity
            </button>
        </form>
    </div>
</body>

</html>
