<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FESWIDE SOCIETY</title>
    <style>
        :root {
            --navy: #002b5e;
            --maroon: #8b0000;
            --white: #ffffff;
            --grey: #f4f4f4;
        }

        body {
            font-family: sans-serif;
            background: var(--grey);
            margin: 0;
        }

        .header {
            background: var(--navy);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid var(--maroon);
        }

        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border: 1px solid #ccc;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            border: 1px solid #000;
            padding: 15px;
        }

        .btn {
            background: var(--navy);
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }

        #global-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            width: 350px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>FESWIDE SOCIETY</h1>
    </div>
    <div class="container">
        <h3>{{ config.get('hero_text') }}</h3>
        <div class="grid">
            {% for p in products %}
            <div class="card">
                <h4>{{ p.name }}</h4>
                <p>KES {{ p.price }}</p>
                <button class="btn" onclick="openPayment('{{ p.id }}', '{{ p.name }}')">PURCHASE</button>
            </div>
            {% endfor %}
        </div>
    </div>

    <div id="global-modal">
        <div class="modal-content">
            <h3 id="mTitle"></h3>
            <select id="method" onchange="toggleInputs()" style="width:100%; padding:10px; margin-bottom:10px;">
                <option value="mpesa">Lipa na M-Pesa</option>
                <option value="binance">Binance Pay (USDT)</option>
            </select>
            <input type="text" id="phone" placeholder="07XXXXXXXX" style="width:94%; padding:10px; margin-bottom:10px;">
            <button class="btn" onclick="pay()">PROCEED</button>
            <button onclick="document.getElementById('global-modal').style.display='none'"
                style="width:100%; background:none; border:none; margin-top:10px;">CANCEL</button>
        </div>
    </div>

    <script>
        let curId = null;
        function openPayment(id, name) { curId = id; document.getElementById('mTitle').innerText = name; document.getElementById('global-modal').style.display = 'flex'; }
        function toggleInputs() { document.getElementById('phone').style.display = document.getElementById('method').value === 'mpesa' ? 'block' : 'none'; }
        async function pay() {
            let m = document.getElementById('method').value;
            let route = m === 'mpesa' ? '/stk-push' : '/binance-pay';
            let body = { product_id: curId, phone: document.getElementById('phone').value };
            let res = await fetch(route, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            let data = await res.json();
            if (data.checkout_url) window.location.href = data.checkout_url;
            else if (data.status === 'success') alert("Check phone for STK Prompt!");
            else alert("Error: " + data.error);
        }
    </script>
</body>

</html>
