<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FESWIDE SOCIETY</title>
    <style>
        :root {
            --navy: #002b5e;
            --maroon: #8b0000;
            --white: #ffffff;
            --grey: #f4f4f4;
        }

        body {
            font-family: sans-serif;
            background: var(--grey);
            margin: 0;
            padding: 0;
        }

        .header {
            background: var(--navy);
            color: white;
            padding: 25px;
            text-align: center;
            border-bottom: 5px solid var(--maroon);
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border: 2px solid #000;
        }

        .btn {
            background: var(--navy);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* CHATTING AGENT STYLES */
        .chat-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--maroon);
            color: white;
            padding: 15px 25px;
            font-weight: bold;
            border: 2px solid #000;
            cursor: pointer;
            z-index: 1000;
        }

        .chat-window {
            display: none;
            position: fixed;
            bottom: 85px;
            right: 20px;
            width: 320px;
            background: white;
            border: 2px solid #000;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .chat-header {
            background: var(--navy);
            color: white;
            padding: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .chat-body {
            height: 280px;
            padding: 15px;
            overflow-y: auto;
            font-size: 14px;
            background: #fafafa;
        }

        .chat-input {
            display: flex;
            border-top: 2px solid var(--navy);
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
        }

        .chat-input button {
            background: var(--navy);
            color: white;
            border: none;
            padding: 0 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>FESWIDE SOCIETY</h1>
    </div>

    <div class="container">
        <h3>{{ config.get('hero_text') }}</h3>
        <div id="productGrid"
            style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
            {% for p in products %}
            <div style="border: 2px solid var(--navy); padding: 20px;">
                <h4 style="color:var(--navy); margin-top:0;">{{ p.name }}</h4>
                <p style="color:var(--maroon); font-size: 22px; font-weight:bold;">KES {{ p.price }}</p>
                <button class="btn" onclick="openPayment('{{ p.id }}', '{{ p.name }}')">PURCHASE</button>
            </div>
            {% endfor %}
        </div>
    </div>

    <button class="chat-btn" onclick="toggleChat()">SUPPORT ASSISTANT</button>
    <div class="chat-window" id="chatWin">
        <div class="chat-header"><span>Agent Faith</span><span onclick="toggleChat()" style="cursor:pointer;">✖</span>
        </div>
        <div class="chat-body" id="chatBody">
            <p><b>Agent Faith:</b> How can I help you navigate the Feswide Index today?</p>
        </div>
        <div class="chat-input">
            <input type="text" id="cInput" placeholder="Enter message..."
                onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">SEND</button>
        </div>
    </div>

    <script>
        function toggleChat() {
            let win = document.getElementById('chatWin');
            win.style.display = (win.style.display === 'block') ? 'none' : 'block';
        }
        async function sendMsg() {
            let input = document.getElementById('cInput');
            let body = document.getElementById('chatBody');
            if (!input.value) return;
            body.innerHTML += `<p style="text-align:right;">${input.value}</p>`;
            let val = input.value; input.value = '';
            body.scrollTop = body.scrollHeight;

            let res = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: val }) });
            let data = await res.json();
            body.innerHTML += `<p><b>Agent Faith:</b> ${data.reply}</p>`;
            body.scrollTop = body.scrollHeight;
        }
    </script>
</body>

</html>
