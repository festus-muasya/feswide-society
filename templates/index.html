<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Feswide Society</title>
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}">
    <style>
        :root {
            --navy: #0a192f;
            --maroon: #800000;
            --white: #f1f1f1;
            --black: #050505;
        }

        body {
            font-family: 'Space Mono', monospace;
            background-color: var(--white);
            color: var(--black);
            margin: 0;
            padding: 20px;
        }

        .nav {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--black);
            padding-bottom: 10px;
        }

        .nav button {
            background: none;
            border: 2px solid var(--black);
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .nav button.active {
            background: var(--navy);
            color: var(--white);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            border: 2px solid var(--black);
            padding: 20px;
            background: white;
            box-shadow: 4px 4px 0 var(--black);
        }

        .btn {
            background: var(--maroon);
            color: var(--white);
            border: 2px solid var(--black);
            padding: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 10px;
        }

        #global-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--white);
            padding: 30px;
            border: 4px solid var(--black);
            width: 400px;
            box-shadow: 8px 8px 0 var(--maroon);
        }

        input,
        select {
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <div class="nav">
        <button id="b-store" class="active" onclick="switchTab('store')">MODULE STORE</button>
        <button id="b-dash" onclick="switchTab('dash')">CONTRIBUTOR HUB</button>
    </div>

    <div id="store">
        <h2>{{ config.get('hero_text') }}</h2>
        <div class="grid">
            {% for p in products %}
            <div class="card">
                <h3 class="card-title">{{ p.name }}</h3>
                <p>{{ p.description }}</p>
                <p style="font-weight:bold; color:var(--maroon);">KES {{ p.price }}</p>
                <button class="btn" onclick="showPaymentModal({{ p.id }}, '{{ p.name }}')">PURCHASE SECURE
                    DOWNLOAD</button>
            </div>
            {% endendfor %}
        </div>
    </div>

    <div id="dash" style="display:none;">
        <h2>Upload Completed Rubric</h2>
        <p>{{ config.get('upload_notice') }}</p>
        <div class="card" style="max-width: 500px;">
            <select id="pform" style="width:100%; padding:10px; margin-bottom:10px;">
                <option>Outlier</option>
                <option>Handshake</option>
            </select>
            <input type="text" id="pname" placeholder="Project Name"
                style="width:100%; padding:10px; margin-bottom:10px;">
            <input type="text" id="pmpesa" placeholder="M-Pesa Number for Payout"
                style="width:100%; padding:10px; margin-bottom:10px;">
            <input type="file" id="pfile" accept=".pdf" style="width:100%; margin-bottom:10px;">
            <button class="btn" style="background:var(--navy);" onclick="submitUpload()">SUBMIT FOR REVIEW</button>
        </div>
    </div>

    <div id="global-modal">
        <div class="modal-content">
            <h2 id="mTitle" style="margin-top:0;"></h2>
            <div id="mBody"></div>
            <button id="mConfirm" class="btn" style="background:var(--navy); margin-top:15px;"></button>
            <button class="btn" onclick="closeModal()"
                style="background:transparent; color:var(--black); margin-top:10px;">CANCEL</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
