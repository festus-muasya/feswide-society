<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DASHBOARD | FESWIDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="bg-white font-sans text-slate-900 select-none" oncontextmenu="return false;">
    <nav
        class="bg-[#0a192f] text-white p-5 sticky top-0 z-50 flex justify-between items-center border-b-4 border-orange-600">
        <h1 class="text-xl font-black italic tracking-tighter">FESWIDE SOCIETY</h1>
        <div class="flex items-center gap-6 text-[10px] font-bold uppercase tracking-widest">
            <a href="/jobs" class="hover:text-orange-500">Jobs Board</a>
            <a href="/proxy" class="hover:text-orange-500">Proxy Switch</a>
            {% if user %}
            <div class="flex items-center gap-2">
                <span class="text-gray-500 font-mono">{{ user.public_id }}</span>
                <div
                    class="w-10 h-10 bg-orange-600 rounded-full flex items-center justify-center border-2 border-white/20">
                    {{ initials }}</div>
            </div>
            {% endif %}
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-10 grid grid-cols-1 md:grid-cols-3 gap-8">
        {% for p in products %}
        <div
            class="bg-white border-2 border-slate-100 p-10 rounded-[2.5rem] shadow-sm hover:shadow-2xl transition-all flex flex-col justify-between">
            <h3 class="text-xl font-black text-[#0a192f]">{{ p.name }}</h3>
            <p class="text-orange-600 font-black text-xl my-6">KES 999.0</p>
            <button onclick="openMpesa('{{ p.name }}')"
                class="w-full bg-[#0a192f] text-white p-4 rounded-2xl font-bold uppercase text-[10px] tracking-widest">Download
                Data</button>
        </div>
        {% endfor %}
    </main>

    <div id="mpesaModal" class="modal flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-sm text-center shadow-2xl border-4 border-[#0a192f]">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/15/M-PESA_LOGO-01.svg" class="w-32 mx-auto mb-8">
            <h3 class="font-black text-2xl mb-2" id="modalTitle">Project Access</h3>
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-8 italic">STK Push Verification
            </p>
            <input type="text" placeholder="2547XXXXXXXX"
                class="w-full border-2 border-black p-5 rounded-2xl mb-4 font-black text-center outline-none focus:border-orange-500">
            <button onclick="alert('STK Push Dispatched.')"
                class="w-full bg-[#2e7d32] text-white p-5 rounded-2xl font-black uppercase text-sm shadow-xl">Pay KES
                999.0</button>
            <button onclick="closeMpesa()"
                class="mt-6 text-[10px] text-gray-400 font-black uppercase tracking-widest">Abort</button>
        </div>
    </div>

    <script>
        function openMpesa(name) { document.getElementById('modalTitle').innerText = name; document.getElementById('mpesaModal').style.display = 'flex'; }
        function closeMpesa() { document.getElementById('mpesaModal').style.display = 'none'; }
        // OPSEC: Disable Right-Click & Inspect
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function (e) { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false; };
    </script>
</body>

</html>
