<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FESWIDE SOCIETY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>

<body class="bg-slate-50 select-none" oncontextmenu="return false;">
    <nav class="bg-[#0a192f] text-white p-4 sticky top-0 z-50 shadow-xl border-b-4 border-orange-600">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black">FESWIDE SOCIETY</h1>
            <form action="/" method="GET" class="flex-1 max-w-xl mx-10">
                <input list="keywords" name="search" class="w-full bg-white/10 p-2 rounded-lg outline-none"
                    placeholder="Search Trajectories...">
                <datalist id="keywords">
                    <option value="Aether Quality Check">
                    <option value="Blackbeard Multimodal">
                    <option value="Kobra Clips">
                    <option value="Cacatua Chorus">
                </datalist>
            </form>
            {% if user %}
            <div class="flex items-center gap-3">
                <div class="text-right text-[10px] font-mono text-gray-400">ID: {{ user.public_id }}</div>
                <div class="w-10 h-10 bg-orange-600 rounded-full flex items-center justify-center font-bold">{{ initials
                    }}</div>
            </div>
            {% else %}<a href="/login" class="bg-orange-600 px-4 py-2 rounded font-bold">LOGIN</a>{% endif %}
        </div>
    </nav>
    <main class="max-w-7xl mx-auto p-10 grid grid-cols-1 md:grid-cols-3 gap-8">
        {% for p in products %}
        <div class="bg-white border p-8 rounded-2xl shadow-sm hover:shadow-xl transition-all">
            <h3 class="font-black text-[#0a192f] mb-4">{{ p.name }}</h3>
            <p class="text-xs text-gray-500 mb-6">{{ p.description }}</p>
            <button class="w-full bg-[#0a192f] text-white p-3 rounded-xl font-bold uppercase text-[10px]">Free Access
                Offer</button>
        </div>
        {% endfor %}
    </main>
    <footer class="bg-[#0a192f] text-gray-500 p-10 text-center text-xs mt-20 border-t border-white/5">
        12 Presnenskaya Naberezhnaya, Tower A, Moscow, Russia | ops@feswide.ru | +7 495 123-45-67
    </footer>

    <script>
        document.addEventListener('copy', e => e.preventDefault());
        document.addEventListener('paste', e => e.preventDefault());
        document.onkeydown = function (e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };
    </script>
</body>

</html>
