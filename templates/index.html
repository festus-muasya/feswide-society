<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FESWIDE SOCIETY</title>
    <style>
        :root {
            --navy: #002b5e;
            --maroon: #8b0000;
            --white: #ffffff;
        }

        body {
            font-family: sans-serif;
            background: #e0e0e0;
            margin: 0;
        }

        .header {
            background: var(--navy);
            color: white;
            padding: 25px;
            text-align: center;
            border-bottom: 5px solid var(--maroon);
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border: 2px solid #000;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            border: 2px solid var(--navy);
            padding: 20px;
        }

        .btn {
            background: var(--navy);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }

        /* Chat agent styles */
        .chat-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--maroon);
            color: white;
            padding: 15px 25px;
            border: 2px solid #000;
            cursor: pointer;
        }

        .chat-window {
            display: none;
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 300px;
            background: white;
            border: 2px solid #000;
        }

        #global-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            width: 350px;
            border: 4px solid var(--navy);
        }
    </style>
</head>

<body oncontextmenu="return false;">
    <div class="header">
        <h1>FESWIDE SOCIETY</h1>
    </div>
    <div class="container">
        <p style="font-weight: bold; border-left: 5px solid var(--navy); padding-left: 10px;">{{ config.get('hero_text')
            }}</p>
        <div class="grid">
            {% for p in products %}
            <div class="card">
                <h4>{{ p.name }}</h4>
                <p>KES {{ p.price }}</p>
                <button class="btn" onclick="openPayment('{{ p.id }}', '{{ p.name }}')">PURCHASE</button>
            </div>
            {% endfor %}
        </div>
    </div>

    <button class="chat-btn" onclick="toggleChat()">SUPPORT ASSISTANT</button>
    <div class="chat-window" id="chatWin">
        <div style="background:var(--navy); color:white; padding:10px;">Agent Faith</div>
        <div id="chatBody" style="height:200px; overflow-y:auto; padding:10px;"></div>
        <input type="text" id="cIn" style="width:100%; padding:10px; box-sizing:border-box;" placeholder="Type here...">
    </div>

    <div id="global-modal">
        <div class="modal-content">
            <h3 id="mTitle"></h3>
            <select id="method" onchange="toggleInputs()" style="width:100%; padding:10px; margin-bottom:10px;">
                <option value="mpesa">Lipa na M-Pesa</option>
                <option value="binance">Binance Pay (USDT)</option>
            </select>
            <input type="text" id="phone" placeholder="07XXXXXXXX"
                style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
            <button class="btn" onclick="pay()">PROCEED</button>
            <button onclick="document.getElementById('global-modal').style.display='none'"
                style="width:100%; background:none; border:none; margin-top:10px; cursor:pointer;">CANCEL</button>
        </div>
    </div>

    <script>
        // OPSEC: DISABLE DEV TOOLS
        document.onkeydown = function (e) {
            if (event.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };

        let curId = null;
        function openPayment(id, name) { curId = id; document.getElementById('mTitle').innerText = name; document.getElementById('global-modal').style.display = 'flex'; }
        function toggleInputs() { document.getElementById('phone').style.display = document.getElementById('method').value === 'mpesa' ? 'block' : 'none'; }
        function toggleChat() { let w = document.getElementById('chatWin'); w.style.display = w.style.display === 'block' ? 'none' : 'block'; }

        async function pay() {
            let m = document.getElementById('method').value;
            let route = m === 'mpesa' ? '/stk-push' : '/binance-pay';
            let res = await fetch(route, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ product_id: curId, phone: document.getElementById('phone').value }) });
            let data = await res.json();
            if (data.checkout_url) window.location.href = data.checkout_url;
            else if (data.status === 'success') alert("Check phone for STK Prompt!");
            else alert("Error: " + data.error);
        }
    </script>
</body>

</html>
