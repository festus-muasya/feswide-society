<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FESWIDE SOCIETY // Official Repository</title>
    <style>
        :root {
            --navy: #003366;
            --maroon: #800000;
            --brown: #8B4513;
            --grey: #e0e0e0;
            --white: #ffffff;
        }

        body {
            background: var(--grey);
            font-family: Arial, sans-serif;
            margin: 0;
        }

        header {
            background: var(--navy);
            padding: 20px;
            color: white;
            border-bottom: 5px solid var(--maroon);
            display: flex;
            justify-content: space-between;
        }

        .nav-btns button {
            background: var(--grey);
            border: 1px solid var(--navy);
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .nav-btns button.active {
            background: var(--maroon);
            color: white;
        }

        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
        }

        .search-box {
            background: white;
            padding: 20px;
            border: 1px solid #ccc;
            position: relative;
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #999;
        }

        .suggestions {
            display: none;
            position: absolute;
            background: white;
            width: 95%;
            border: 1px solid var(--navy);
            z-index: 10;
        }

        .s-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }

        .s-item:hover {
            background: var(--navy);
            color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border: 1px solid #ccc;
            border-top: 5px solid var(--navy);
            padding: 20px;
            text-align: center;
        }

        .btn-buy {
            background: var(--navy);
            color: white;
            width: 100%;
            padding: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .panel {
            background: white;
            border: 1px solid #ccc;
            padding: 20px;
            margin-bottom: 20px;
        }

        .notice {
            background: #fff3cd;
            padding: 15px;
            border: 1px solid #ffeeba;
            color: #856404;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-control {
            width: 100%;
            padding: 8px;
            border: 1px solid #999;
        }

        #chatbot {
            position: fixed;
            bottom: 0;
            right: 20px;
            width: 280px;
            border: 2px solid var(--navy);
            background: white;
            display: none;
            flex-direction: column;
        }

        .chat-btn {
            position: fixed;
            bottom: 10px;
            right: 20px;
            background: var(--maroon);
            color: white;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <header>
        <h1>FESWIDE SOCIETY</h1>
        <div class="nav-btns">
            <button onclick="show('store')" id="b-store" class="active">REPOSITORY</button>
            <button onclick="show('dash')" id="b-dash">CONTRIBUTOR PORTAL</button>
        </div>
    </header>
    <div class="container">
        <div id="store">
            <div class="search-box">
                <input type="text" id="sInput" class="search-input" placeholder="Search Database..."
                    onkeyup="doSearch()">
                <div id="sBox" class="suggestions"></div>
            </div>
            <div class="grid">
                {% for p in products %}
                <div class="card">
                    <h3>{{ p.name }}</h3>
                    <p style="font-size: 20px; font-weight: bold; color: var(--maroon);">KES {{ p.price }}</p>
                    <button class="btn-buy" onclick="alert('Checkout for {{p.name}}')">PURCHASE</button>
                </div>
                {% endfor %}
            </div>
        </div>
        <div id="dash" style="display:none;">
            <div class="panel">
                <h2 style="color: var(--navy); border-bottom: 2px solid var(--maroon);">CONTRIBUTOR UPLOAD</h2>
                <div class="notice">KES 500/= payout after manual review (approx. 48hrs).</div>
                <div class="form-group">
                    <label>Platform:</label>
                    <select id="pform" class="form-control">
                        <option>Handshake AI</option>
                        <option>Outlier AI</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Project Name:</label>
                    <input type="text" id="pname" class="form-control">
                </div>
                <div class="form-group">
                    <label>M-Pesa Number:</label>
                    <input type="text" id="pmpesa" class="form-control" placeholder="2547...">
                </div>
                <input type="file" id="pfile" accept=".pdf" style="margin-top: 10px;">
                <button class="btn-buy" onclick="up()" style="margin-top: 15px;">SUBMIT PDF</button>
            </div>
            <div class="panel" style="border-top: 5px solid var(--brown);">
                <h2 style="color: var(--brown);">VOTE BOX (REQUEST CRACK)</h2>
                <input type="text" id="vname" class="form-control" placeholder="Project Name">
                <button class="btn-buy" style="background: var(--brown); margin-top: 10px;" onclick="vote()">SUBMIT
                    REQUEST</button>
            </div>
        </div>
    </div>
    <div class="chat-btn" onclick="tChat()">SUPPORT</div>
    <div id="chatbot">
        <div style="background: var(--navy); color: white; padding: 10px;">Agent Faith</div>
        <div style="height: 150px; padding: 10px; background: #eee; font-size: 12px;">Welcome to Feswide Society.</div>
    </div>
    <script>
        function show(v) {
            document.getElementById('store').style.display = v == 'store' ? 'block' : 'none';
            document.getElementById('dash').style.display = v == 'dash' ? 'block' : 'none';
            document.getElementById('b-store').className = v == 'store' ? 'active' : '';
            document.getElementById('b-dash').className = v == 'dash' ? 'active' : '';
        }
        async function doSearch() {
            let q = document.getElementById('sInput').value;
            let b = document.getElementById('sBox');
            if (q.length < 2) { b.style.display = 'none'; return; }
            let res = await fetch('/api/search?q=' + q);
            let data = await res.json();
            b.innerHTML = '';
            if (data.length) {
                data.forEach(i => {
                    let d = document.createElement('div'); d.className = 's-item';
                    d.innerHTML = `<span>${i.name}</span> <span>${i.price ? 'KES ' + i.price : ''}</span>`;
                    b.appendChild(d);
                });
                b.style.display = 'block';
            }
        }
        async function up() {
            let fd = new FormData();
            fd.append('file', document.getElementById('pfile').files[0]);
            fd.append('platform', document.getElementById('pform').value);
            fd.append('project_name', document.getElementById('pname').value);
            fd.append('mpesa_number', document.getElementById('pmpesa').value);
            let res = await fetch('/upload-answer', { method: 'POST', body: fd });
            let d = await res.json(); alert(d.message || d.error);
        }
        async function vote() {
            let n = document.getElementById('vname').value;
            await fetch('/request-project', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ project_name: n, platform: 'Requested' }) });
            alert("Feswide society will crack them in less than 48hrs. Check back soon.");
        }
        function tChat() { let c = document.getElementById('chatbot'); c.style.display = c.style.display == 'flex' ? 'none' : 'flex'; }
    </script>
</body>

</html>
