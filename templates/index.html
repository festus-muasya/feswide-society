<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DASHBOARD | FESWIDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="bg-white font-sans text-slate-900 select-none" oncontextmenu="return false;">
    <nav
        class="bg-[#0a192f] text-white p-5 border-b-4 border-orange-600 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-black italic tracking-tighter">FESWIDE SOCIETY</h1>
        {% if user %}
        <div class="flex items-center gap-4">
            <span class="text-[10px] font-mono text-gray-500">{{ user.public_id }}</span>
            <div
                class="w-10 h-10 bg-orange-600 rounded-full flex items-center justify-center font-bold border-2 border-white/20">
                {{ initials }}</div>
        </div>
        {% endif %}
    </nav>

    <main class="max-w-7xl mx-auto p-6 md:p-12">
        <h2 class="text-4xl font-black mb-12 uppercase italic tracking-tighter">Verified Repository</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            {% for p in products %}
            <div
                class="bg-white border-2 border-slate-100 p-10 rounded-[2.5rem] shadow-sm hover:shadow-2xl transition-all flex flex-col justify-between">
                <div>
                    <h3 class="text-2xl font-black text-[#0a192f] mb-2">{{ p.name }}</h3>
                    <p class="text-orange-600 font-black text-xl mb-10">KES 999.0</p>
                </div>
                <button onclick="openMpesa('{{ p.name }}')"
                    class="w-full bg-[#0a192f] text-white p-5 rounded-3xl font-black uppercase text-xs tracking-widest shadow-lg">Download
                    Data</button>
            </div>
            {% endfor %}
        </div>
    </main>

    <div id="mpesaModal" class="modal flex items-center justify-center p-4">
        <div class="bg-white p-8 md:p-12 rounded-[3rem] w-full max-w-sm text-center shadow-2xl">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/15/M-PESA_LOGO-01.svg" class="w-24 mx-auto mb-8">
            <h3 class="font-black text-2xl mb-2" id="modalTitle">STK PUSH</h3>
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-8">Service: Verified Trajectory
            </p>
            <input type="text" placeholder="2547XXXXXXXX"
                class="w-full border-2 border-black p-5 rounded-2xl mb-4 font-black text-center outline-none focus:border-orange-500">
            <button onclick="alert('Transaction Initialized. Check your phone.')"
                class="w-full bg-[#2e7d32] text-white p-5 rounded-2xl font-black uppercase shadow-lg">Authorize KES
                999.0</button>
            <button onclick="closeMpesa()"
                class="mt-6 text-[10px] text-gray-400 font-black uppercase tracking-widest">Cancel Transaction</button>
        </div>
    </div>

    <script>
        function openMpesa(name) { document.getElementById('modalTitle').innerText = name; document.getElementById('mpesaModal').style.display = 'flex'; }
        function closeMpesa() { document.getElementById('mpesaModal').style.display = 'none'; }
    </script>
</body>

</html>
