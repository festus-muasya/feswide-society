<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>

<body class="bg-gray-100 p-10">
    <div class="max-w-7xl mx-auto space-y-10">
        <div class="flex justify-between items-center bg-[#0a192f] text-white p-6 rounded-xl">
            <h1 class="text-2xl font-bold">TERMINAL: {{ role|upper }}</h1>
            <a href="/logout" class="text-red-400 font-bold">[ LOGOUT ]</a>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="bg-white p-8 rounded-xl shadow-lg">
                <h3 class="font-bold border-b pb-4 mb-4">SUBADMIN MONITOR</h3>
                <table class="w-full text-sm">
                    {% for a in admins %}<tr>
                        <td class="py-2">{{ a.username }}</td>
                        <td>{{ a.role }}</td>
                    </tr>{% endfor %}
                </table>
            </div>
            <div class="bg-white p-8 rounded-xl shadow-lg">
                <h3 class="font-bold border-b pb-4 mb-4">AI SUBMISSION MONITOR</h3>
                <table class="w-full text-xs">
                    <thead>
                        <tr class="text-left bg-gray-50">
                            <th>USER ID</th>
                            <th>PLATFORM</th>
                            <th>PROJECT</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for sub, user in submissions %}
                        <tr>
                            <td class="py-2 font-mono">{{ user.public_id }}</td>
                            <td>{{ sub.platform }}</td>
                            <td>{{ sub.project_name }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
