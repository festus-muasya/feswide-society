<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>COMMAND CENTER</title>
    <style>
        :root {
            --navy: #0a192f;
            --maroon: #800000;
            --bg: #f4f7f9;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
        }

        .panel {
            background: #fff;
            border: 1px solid #ddd;
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 4px;
        }

        h3 {
            margin-top: 0;
            color: var(--navy);
            border-bottom: 2px solid var(--bg);
            padding-bottom: 12px;
            font-size: 14px;
            text-transform: uppercase;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        .btn-del {
            background: #e53e3e;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 10px;
        }
    </style>
</head>

<body oncontextmenu="return false;">
    <div
        style="background:var(--navy); color:#fff; padding:15px; display:flex; justify-content:space-between; align-items:center; border-bottom:5px solid var(--maroon);">
        <h2>FESWIDE TERMINAL [{{ role|upper }}]</h2>
        <a href="/logout" style="color:#ff9b9b; text-decoration:none; font-weight:bold;">[LOGOUT]</a>
    </div>
    <div class="panel" style="border-left: 8px solid var(--maroon); margin-top:20px;">
        <h3>Broadcast Alert</h3>
        <form action="/admin/update-config" method="POST" style="display:flex; gap:10px;">
            <input name="hero_text" value="{{ config_text }}" style="flex:1; padding:10px; border:1px solid #ccc;">
            <button type="submit"
                style="background:var(--maroon); color:#fff; border:none; padding:10px 20px; cursor:pointer;">Update
                Store</button>
        </form>
    </div>
    <div class="panel">
        <h3>Marketplace Moderator (Delete Posts)</h3>
        <table>
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Platform</th>
                    <th>Contact</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for h in hiring %}
                <tr>
                    <td>HIRING</td>
                    <td>{{ h.platform }}</td>
                    <td>{{ h.whatsapp }}</td>
                    <td>
                        <form action="/admin/delete-opportunity/{{ h.id }}" method="POST"><button type="submit"
                                class="btn-del">Delete</button></form>
                    </td>
                </tr>
                {% endfor %}
                {% for t in taskers %}
                <tr>
                    <td>TASKER</td>
                    <td>{{ t.platform }}</td>
                    <td>{{ t.whatsapp }}</td>
                    <td>
                        <form action="/admin/delete-opportunity/{{ t.id }}" method="POST"><button type="submit"
                                class="btn-del">Delete</button></form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>

</html>
