<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ADMIN CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Global OPSEC: Disable Right-Click, Inspect, and Copy
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function (e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };
        document.addEventListener('copy', e => e.preventDefault());
        document.addEventListener('selectstart', e => e.preventDefault());
    </script>
</head>

<body class="bg-slate-900 text-white p-10">
    <div class="max-w-7xl mx-auto space-y-10">
        <div class="flex justify-between items-center border-b border-white/10 pb-6">
            <h1 class="text-3xl font-black italic">FESWIDE SYSTEM CONTROL</h1>
            <a href="/logout" class="text-red-500 font-bold">[ TERMINATE ]</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="bg-white text-black p-8 rounded-3xl">
                <h3 class="font-bold border-b pb-2 mb-4">USER IDENTITY MONITOR</h3>
                <table class="w-full text-xs">
                    <thead>
                        <tr>
                            <th class="text-left">Full Name</th>
                            <th>ID (698b...)</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for u in users %}<tr>
                            <td>{{ u.full_name }}</td>
                            <td class="font-mono">{{ u.public_id }}</td>
                        </tr>{% endfor %}
                    </tbody>
                </table>
            </div>
            <div class="bg-white text-black p-8 rounded-3xl">
                <h3 class="font-bold border-b pb-2 mb-4">OPPORTUNITY MANAGEMENT</h3>
                <table class="w-full text-xs">
                    <thead>
                        <tr>
                            <th class="text-left">Category</th>
                            <th>Role</th>
                            <th>Contact</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for o in opps %}<tr>
                            <td>{{ o.category }}</td>
                            <td>{{ o.role }}</td>
                            <td>{{ o.contact }}</td>
                        </tr>{% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
