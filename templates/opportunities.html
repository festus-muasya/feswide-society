<!DOCTYPE html>
<html>

<head>
    <title>FESWIDE | OPPORTUNITIES</title>
    <style>
        :root {
            --navy: #0a192f;
            --milky: #fdfcf0;
            --maroon: #800000;
        }

        body {
            font-family: sans-serif;
            background: var(--milky);
            margin: 0;
        }

        .header {
            background: var(--navy);
            color: white;
            padding: 20px;
            border-bottom: 5px solid var(--maroon);
        }

        .back-link {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .panel {
            background: white;
            border: 2px solid #000;
            padding: 30px;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>
    <div class="header">
        <a href="/" class="back-link">← Back to Store</a>
        <h1 style="text-align:center;">MARKETPLACE</h1>
    </div>
    <div class="container">
        <div class="panel">
            <h2>Hiring Board</h2>
            {% for h in hiring %}<div style="border-bottom:1px solid #eee; padding:15px 0;"><b>{{ h.platform }}</b>: {{
                h.description }}</div>{% endfor %}
        </div>
        <div class="panel">
            <h2>Tasker Directory</h2>
            {% for t in taskers %}<div style="border-bottom:1px solid #eee; padding:15px 0;"><b>Verified Tasker</b>: {{
                t.description }}</div>{% endfor %}
        </div>
    </div>
</body>

</html>
