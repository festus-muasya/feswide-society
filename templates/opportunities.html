<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>APPLY | FESWIDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 p-10">
    <div class="max-w-xl mx-auto bg-white p-10 rounded-[2rem] border-2 border-black shadow-[15px_15px_0_#000]">
        <h2 class="text-3xl font-black italic mb-8 uppercase">Opportunities Portal</h2>
        <form method="POST" class="space-y-6">
            <select name="category" class="w-full border-2 border-black p-4 font-bold">
                <option value="Hiring">I am Hiring (Listing)</option>
                <option value="Tasking">I am Looking for Work (Tasker)</option>
            </select>
            <select name="role" class="w-full border-2 border-black p-4 font-bold">
                <option>Account Owner</option>
                <option>Tasker Role</option>
                <option>Answer Researcher</option>
            </select>
            <input name="platform" placeholder="PLATFORM (e.g. Handshake AI)"
                class="w-full border-2 border-black p-4 font-bold">
            <textarea name="desc" placeholder="Brief details about your role/offer..."
                class="w-full border-2 border-black p-4 font-bold h-32"></textarea>
            <input name="contact" placeholder="WHATSAPP / TELEGRAM" class="w-full border-2 border-black p-4 font-bold">
            <button type="submit"
                class="w-full bg-orange-600 text-white p-5 font-black uppercase tracking-widest shadow-lg">Post to
                Marketplace</button>
        </form>
    </div>
</body>

</html>
