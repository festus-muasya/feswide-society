<!DOCTYPE html>
<html>

<head>
    <title>Marketplace</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .panel {
            background: white;
            border: 2px solid #000;
            padding: 30px;
            margin: 50px auto;
            max-width: 600px;
            box-shadow: 10px 10px 0 #000;
        }

        .opp-btn {
            background: #ff9800;
            color: #000;
            border: 2px solid #000;
            padding: 15px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: block;
            text-align: center;
        }
    </style>
</head>

<body style="background: #fdfcf0;">
    <div class="panel">
        <h2 style="border-bottom: 2px solid #000; padding-bottom: 10px;">AVAILABLE TASKS</h2>
        <p>Premium task management for active AI contributors.</p>
        <button onclick="window.location.href='https://www.multimango.com'" class="opp-btn">VIEW AVAILABLE TASKS
            (UPGRADE)</button>
    </div>

    <div class="panel">
        <h2>SUBMIT DOCUMENT</h2>
        <form action="/submit-ai-answer" method="POST">
            <select name="platform" style="width: 100%; padding: 10px; margin-bottom: 15px;">
                <option value="Outlier AI">Outlier AI</option>
                <option value="Handshake AI">Handshake AI</option>
            </select>
            <input name="project" placeholder="EXACT PROJECT NAME" required
                style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #000;">
            <input type="file" required style="margin-bottom: 15px;">
            <button type="submit"
                style="background: #0a192f; color: white; width: 100%; padding: 15px; border: none; cursor: pointer;">SUBMIT
                FOR LOGGING</button>
        </form>
    </div>
</body>

</html>
