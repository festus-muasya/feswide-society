<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 h-screen flex items-center justify-center select-none" oncontextmenu="return false;">
    <div class="bg-white p-10 rounded-2xl w-full max-w-sm shadow-[20px_20px_0_#000]">
        <h2 class="text-2xl font-black text-slate-900 mb-6 uppercase italic">Command Center Login</h2>
        {% if error %}<div class="text-red-600 text-xs font-bold mb-4">{{ error }}</div>{% endif %}
        <form method="POST" class="space-y-4">
            <input name="u" placeholder="OPERATOR ID" required
                class="w-full border-2 border-slate-900 p-3 outline-none">
            <input type="password" name="p" placeholder="OPERATOR PASSWORD" required
                class="w-full border-2 border-slate-900 p-3 outline-none">
            <button type="submit" class="w-full bg-slate-900 text-white p-4 font-bold uppercase tracking-widest">Login
                to Terminal</button>
        </form>
    </div>
</body>

</html>
