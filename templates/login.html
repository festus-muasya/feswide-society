<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Terminal Access</title>
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}">
    <style>
        body {
            font-family: 'Space Mono', monospace;
            background: #050505;
            color: #00ff00;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            border: 2px solid #00ff00;
            padding: 40px;
            text-align: center;
        }

        input {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            background: black;
            border: 1px solid #00ff00;
            color: #00ff00;
            box-sizing: border-box;
            font-family: 'Space Mono', monospace;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #00ff00;
            color: black;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>FESWIDE SOCIETY</h2>
        <p>SECURE TERMINAL LOGIN</p>
        {% if error %}<p style="color:red; font-weight:bold;">{{ error }}</p>{% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Operator ID" required>
            <input type="password" name="password" placeholder="Passkey" required>
            <button type="submit">INITIALIZE SESSION</button>
        </form>
    </div>
</body>

</html>
