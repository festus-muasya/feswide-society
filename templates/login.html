<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ADMIN LOGIN</title>
    <style>
        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            margin: 0;
        }

        .card {
            background: #fff;
            width: 350px;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border-top: 6px solid #0a192f;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 3px;
            box-sizing: border-box;
            margin-bottom: 20px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #0a192f;
            color: #fff;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2 style="color:#0a192f; text-transform:uppercase;">Admin Portal</h2>
        {% if error %}<p style="color:#800000; font-weight:bold; font-size:12px;">{{ error }}</p>{% endif %}
        <form method="POST">
            <input name="username" placeholder="Username" required autocomplete="off">
            <input name="password" type="password" placeholder="Password" required>
            <button type="submit">Secure Login</button>
        </form>
    </div>
</body>

</html>
