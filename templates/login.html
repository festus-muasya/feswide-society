<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>LOGIN</title>
    <style>
        :root {
            --navy: #0a192f;
            --maroon: #800000;
            --milky: #fdfcf0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--milky);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .auth-card {
            background: white;
            border: 2px solid #000;
            padding: 40px;
            box-shadow: 10px 10px 0 #000;
            width: 350px;
        }

        h2 {
            color: var(--navy);
            text-transform: uppercase;
            border-bottom: 3px solid var(--maroon);
            margin-top: 0;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #000;
            box-sizing: border-box;
        }

        .btn-navy {
            width: 100%;
            padding: 15px;
            background: var(--navy);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            background: #fff;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            margin-top: 20px;
            text-decoration: none;
            color: #333;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <h2>{% if mode == 'login' %}LOGIN{% else %}REGISTER{% endif %}</h2>
        <form method="POST" action="{% if mode == 'login' %}/login{% else %}/register{% endif %}">
            {% if mode == 'register' %}<input type="text" name="name" placeholder="FULL NAME" required>{% endif %}
            <input type="email" name="email" placeholder="EMAIL ADDRESS" required>
            <input type="password" name="password" placeholder="PASSKEY" required>
            <button type="submit" class="btn-navy">VERIFY IDENTITY</button>
        </form>
        <a href="/auth/google" class="btn-google">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20"> Continue with Google
        </a>
        <div style="margin-top: 20px; text-align: center; font-size: 12px;">
            {% if mode == 'login' %}<a href="/register">Need Identity? Register →</a>{% else %}<a href="/login">Return
                to Login →</a>{% endif %}
        </div>
    </div>
</body>

</html>
