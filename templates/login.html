<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN PORTAL | FESWIDE SOCIETY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a192f;
            --maroon: #800000;
            --white: #ffffff;
            --bg: #f0f2f5;
        }

        /* 1. CLASSIC CARD AESTHETIC */
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }

        .login-card {
            background: var(--white);
            padding: 45px;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 380px;
            border-top: 6px solid var(--navy);
            text-align: center;
        }

        h2 {
            color: var(--navy);
            margin-bottom: 35px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 20px;
            font-weight: 700;
        }

        /* 2. FORM STYLING */
        .input-group {
            text-align: left;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 3px;
            box-sizing: border-box;
            font-size: 16px;
            background: #fdfdfd;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--navy);
            background: #fff;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--navy);
            color: var(--white);
            border: none;
            border-radius: 3px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #112240;
        }

        .error-msg {
            color: var(--maroon);
            font-size: 12px;
            margin-bottom: 20px;
            font-weight: 700;
            padding: 10px;
            background: #fff5f5;
            border: 1px solid #feb2b2;
        }
    </style>
</head>

<body oncontextmenu="return false;">

    <div class="login-card">
        <h2>Admin Portal</h2>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="ADMIN ID" required autocomplete="off">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="PASSKEY" required>
            </div>

            <button type="submit" class="login-btn">Secure Login</button>
        </form>
    </div>

    <script>
        /**
         * 3. OPSEC: HARDENED SOURCE PROTECTION
         * Mathematically disables DevTools (F12), Inspect, and View Source
         */
        document.onkeydown = function (e) {
            if (event.keyCode == 123) return false; // F12
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false; // Inspect/Console
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // View Source
            if (e.ctrlKey && e.keyCode == 'S'.charCodeAt(0)) return false; // Save Page
        };
    </script>
</body>

</html>
