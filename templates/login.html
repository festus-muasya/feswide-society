<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FESWIDE SOCIETY // LOGIN</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: var(--white);
            border: 4px solid var(--navy);
            padding: 40px;
            box-shadow: 15px 15px 0px rgba(0, 0, 0, 0.8);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
    </style>
</head>

<body oncontextmenu="return false;">
    <div class="login-card">
        <h2 style="color: var(--maroon); margin-bottom: 20px; text-decoration: underline;">SECURE TERMINAL</h2>
        {% if error %}
        <div class="notice" style="background: var(--maroon); color: white; border-color: black;">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/login">
            <input type="text" name="username" class="form-control" placeholder="OPERATOR ID" required>
            <input type="password" name="password" class="form-control" placeholder="PASSKEY" required>
            <button type="submit" class="btn-action">AUTHENTICATE</button>
        </form>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
