<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Terminal Access</title>
    <link rel="icon" href="{{ url_for('static', filename='images/logo.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            border-top: 5px solid var(--navy);
            padding: 40px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        input {
            display: block;
            width: 100%;
            margin: 15px 0;
            padding: 12px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2 style="color: var(--navy); margin-top: 0;">FESWIDE TERMINAL</h2>
        <p style="color: #666;">AUTHORIZED ACCESS ONLY</p>
        {% if error %}<p class="text-red">{{ error }}</p>{% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Operator ID" required>
            <input type="password" name="password" placeholder="Passkey" required>
            <button type="submit" class="btn-purchase">LOGIN</button>
        </form>
    </div>
</body>

</html>
