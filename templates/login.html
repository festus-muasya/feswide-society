<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Feswide Society</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a192f;
            --maroon: #800000;
            --white: #ffffff;
            --light-grey: #f0f2f5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light-grey);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: var(--white);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 380px;
            border-top: 5px solid var(--navy);
            text-align: center;
        }

        h2 {
            color: var(--navy);
            margin-bottom: 30px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-size: 22px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #555;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
            background: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: var(--navy);
            background: #fff;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--navy);
            color: var(--white);
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 14px;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #112240;
        }

        .error-msg {
            color: var(--maroon);
            font-size: 13px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* OPSEC Style - Hides cursor on right click */
        body {
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>

<body oncontextmenu="return false;">

    <div class="login-card">
        <h2>Admin Portal</h2>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter Admin ID" required
                    autocomplete="off">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter Passkey" required>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>
    </div>

    <script>
        /**
         * OPSEC: HARDENED SOURCE PROTECTION
         * Disables F12, Ctrl+Shift+I, Ctrl+U, and Ctrl+S
         */
        document.onkeydown = function (e) {
            // Disable F12
            if (event.keyCode == 123) return false;
            // Disable Ctrl+Shift+I (Inspect)
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            // Disable Ctrl+Shift+J (Console)
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            // Disable Ctrl+U (View Source)
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
            // Disable Ctrl+S (Save)
            if (e.ctrlKey && e.keyCode == 'S'.charCodeAt(0)) return false;
        };
    </script>
</body>

</html>
