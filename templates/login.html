<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ACCESS | FESWIDE SOCIETY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072') no-repeat center center fixed;
            background-size: cover;
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body class="h-screen flex items-center justify-center p-6 select-none" oncontextmenu="return false;">
    <div class="glass w-full max-w-md p-10 rounded-3xl shadow-2xl text-white">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-tighter">FESWIDE <span class="text-orange-500">OPS</span></h1>
            <p class="text-sm text-gray-300">Identity Verification Terminal</p>
        </div>
        {% if error %}<p
            class="bg-red-500/20 text-red-200 p-3 rounded-lg text-xs mb-6 text-center border border-red-500">{{ error }}
        </p>{% endif %}
        <form method="POST" class="space-y-4">
            {% if mode == 'register' %}<input type="text" name="name" placeholder="FULL OPERATOR NAME" required
                class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-orange-500">{%
            endif %}
            <input type="email" name="email" placeholder="EMAIL ADDRESS" required
                class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-orange-500">
            <input type="password" name="password" placeholder="SECURE PASSKEY" required
                class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-orange-500">
            <button type="submit"
                class="w-full bg-orange-600 hover:bg-orange-700 p-4 rounded-xl font-bold uppercase transition-all shadow-lg shadow-orange-900/20">Authorize</button>
        </form>
        <a href="/auth/google"
            class="w-full mt-6 flex items-center justify-center gap-3 bg-white text-black p-4 rounded-xl font-semibold hover:bg-gray-100 transition-all">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20"> Continue with Google
        </a>
        <div class="mt-8 text-center text-xs text-gray-400">
            {% if mode == 'login' %}Need Identity? <a href="/register" class="text-orange-500 font-bold">Register</a>{%
            else %}Registered? <a href="/login" class="text-orange-500 font-bold">Login</a>{% endif %}
        </div>
    </div>
</body>

</html>
