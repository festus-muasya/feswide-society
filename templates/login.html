<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Terminal Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background: white;
            border-top: 5px solid #002b5e;
            padding: 40px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        input {
            display: block;
            width: 100%;
            margin: 15px 0;
            padding: 12px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #002b5e;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
        }

        h2 {
            color: #002b5e;
            margin-top: 0;
        }

        .text-red {
            color: #8b0000;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>FESWIDE TERMINAL</h2>
        <p style="color: #666;">AUTHORIZED ACCESS ONLY</p>
        {% if error %}<p class="text-red">{{ error }}</p>{% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Operator ID" required>
            <input type="password" name="password" placeholder="Passkey" required>
            <button type="submit">LOGIN</button>
        </form>
    </div>
</body>

</html>
